version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: saymons_db
    environment:
      POSTGRES_USER: saymons
      POSTGRES_PASSWORD: saymons123
      POSTGRES_DB: saymons_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
