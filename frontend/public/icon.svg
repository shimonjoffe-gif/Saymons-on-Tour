<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#003DA5"/>

  <!-- Football white base -->
  <circle cx="256" cy="256" r="190" fill="white" stroke="#003DA5" stroke-width="6"/>

  <!-- Classic football pentagon pattern in blue -->
  <!-- Center pentagon -->
  <polygon points="256,156 318,200 294,272 218,272 194,200" fill="#003DA5"/>

  <!-- Top pentagon -->
  <polygon points="256,156 318,200 294,272 218,272 194,200"
           fill="#003DA5" transform="rotate(0,256,256)"/>

  <!-- Surrounding pentagons (6 around center) -->
  <polygon points="256,156 318,200 294,272 218,272 194,200"
           fill="#003DA5" transform="rotate(60,256,256)"/>
  <polygon points="256,156 318,200 294,272 218,272 194,200"
           fill="#003DA5" transform="rotate(120,256,256)"/>
  <polygon points="256,156 318,200 294,272 218,272 194,200"
           fill="#003DA5" transform="rotate(180,256,256)"/>
  <polygon points="256,156 318,200 294,272 218,272 194,200"
           fill="#003DA5" transform="rotate(240,256,256)"/>
  <polygon points="256,156 318,200 294,272 218,272 194,200"
           fill="#003DA5" transform="rotate(300,256,256)"/>

  <!-- Clip to circle -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#003DA5" stroke-width="12"/>

  <!-- Shine -->
  <ellipse cx="205" cy="180" rx="55" ry="32" fill="white" opacity="0.3" transform="rotate(-35 205 180)"/>
</svg>
